<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>คู่มือ — Comply Verify Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --c-bg: #fafafa;
  --c-surface: #ffffff;
  --c-text: #111827;
  --c-text-soft: #4b5563;
  --c-text-faint: #9ca3af;
  --c-border: #e5e7eb;
  --c-divider: #f3f4f6;
  --c-primary: #4f46e5;
  --c-primary-soft: #eef2ff;
  --c-success: #10b981;
  --c-success-soft: #d1fae5;
  --c-warn: #f59e0b;
  --c-warn-soft: #fef3c7;
  --c-danger: #ef4444;
  --c-danger-soft: #fee2e2;
  --c-code-bg: #f3f4f6;
  --c-quote: #f9fafb;
  --f-base: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun",
            "Noto Sans Thai", system-ui, sans-serif;
  --f-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  --header-h: 56px;
  --aside-w: 300px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --c-bg: #0f172a;
    --c-surface: #1e293b;
    --c-text: #f1f5f9;
    --c-text-soft: #cbd5e1;
    --c-text-faint: #64748b;
    --c-border: #334155;
    --c-divider: #1e293b;
    --c-primary: #818cf8;
    --c-primary-soft: rgba(129,140,248,0.15);
    --c-success: #34d399;
    --c-success-soft: rgba(52,211,153,0.15);
    --c-warn: #fbbf24;
    --c-warn-soft: rgba(251,191,36,0.15);
    --c-danger: #f87171;
    --c-danger-soft: rgba(248,113,113,0.15);
    --c-code-bg: #0f172a;
    --c-quote: #1a2238;
  }
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--c-bg);
  color: var(--c-text);
  font: 16px/1.6 var(--f-base);
}

/* ── Top header ─────────────────────────────────────── */
.man-header {
  position: sticky; top: 0;
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  height: var(--header-h);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
  z-index: 50;
}
.man-header h1 {
  margin: 0; font-size: 16px; font-weight: 600;
  color: var(--c-text);
  display: inline-flex; align-items: center; gap: 8px;
}
.man-header h1 .pill {
  background: var(--c-primary-soft); color: var(--c-primary);
  font-size: 11px; padding: 2px 8px; border-radius: 999px;
  font-weight: 700; letter-spacing: 0.04em;
}
.man-header .spacer { flex: 1; }
.man-header input[type="search"] {
  width: 280px;
  padding: 6px 10px; border: 1px solid var(--c-border);
  background: var(--c-bg); color: var(--c-text);
  border-radius: 6px;
  font: inherit; font-size: 13px;
}
.man-header input[type="search"]:focus {
  border-color: var(--c-primary);
  outline: 2px solid var(--c-primary-soft);
}
.man-header a {
  color: var(--c-text-soft); text-decoration: none;
  font-size: 13px; padding: 6px 10px; border-radius: 6px;
}
.man-header a:hover { background: var(--c-divider); color: var(--c-text); }
.man-header a.primary {
  background: var(--c-primary); color: white;
}
.man-header a.primary:hover { filter: brightness(1.08); }

/* ── Layout: aside (TOC) + main ────────────────────── */
.man-layout {
  display: grid;
  grid-template-columns: var(--aside-w) 1fr;
  max-width: 1400px;
  margin: 0 auto;
}
.man-aside {
  position: sticky; top: var(--header-h);
  height: calc(100vh - var(--header-h));
  overflow-y: auto;
  padding: 20px 14px;
  border-right: 1px solid var(--c-divider);
  font-size: 13px;
}
.man-aside .toc-title {
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 11px;
  color: var(--c-text-faint);
  font-weight: 700;
  margin: 0 0 8px 8px;
}
.man-aside .toc {
  list-style: none; padding: 0; margin: 0;
}
.man-aside .toc li { line-height: 1.4; }
.man-aside .toc a {
  display: block;
  padding: 4px 8px; border-radius: 5px;
  color: var(--c-text-soft); text-decoration: none;
  border-left: 2px solid transparent;
}
.man-aside .toc a:hover { background: var(--c-divider); color: var(--c-text); }
.man-aside .toc a.active {
  background: var(--c-primary-soft); color: var(--c-primary);
  border-left-color: var(--c-primary);
  font-weight: 600;
}
.man-aside .toc .lvl-2 a { padding-left: 18px; font-size: 12px; }
.man-aside .toc .lvl-3 a { padding-left: 28px; font-size: 12px; color: var(--c-text-faint); }

/* ── Main content ──────────────────────────────────── */
.man-main {
  max-width: 880px;
  padding: 32px 40px 80px;
  font-size: 16px;
}
.man-main h1 { font-size: 28px; margin-top: 0; line-height: 1.2; }
.man-main h2 {
  font-size: 22px;
  margin-top: 48px; padding-top: 8px;
  border-top: 1px solid var(--c-divider);
  scroll-margin-top: calc(var(--header-h) + 16px);
}
.man-main h3 {
  font-size: 18px; margin-top: 32px;
  scroll-margin-top: calc(var(--header-h) + 16px);
}
.man-main h4 { font-size: 15px; margin-top: 20px; }
.man-main h2:first-child, .man-main h2:nth-child(2) { border-top: 0; padding-top: 0; }
.man-main p { margin: 12px 0; }
.man-main ul, .man-main ol { padding-left: 24px; }
.man-main li { margin: 4px 0; }
.man-main blockquote {
  margin: 12px 0; padding: 12px 16px;
  background: var(--c-quote);
  border-left: 4px solid var(--c-primary);
  border-radius: 0 6px 6px 0;
}
.man-main blockquote p:first-child { margin-top: 0; }
.man-main blockquote p:last-child  { margin-bottom: 0; }

.man-main code {
  font-family: var(--f-mono); font-size: 13.5px;
  background: var(--c-code-bg);
  padding: 1px 6px; border-radius: 4px;
}
.man-main pre {
  background: var(--c-code-bg);
  padding: 14px 16px; border-radius: 8px;
  overflow-x: auto;
  font-size: 13px; line-height: 1.55;
  margin: 16px 0;
}
.man-main pre code { padding: 0; background: none; font-size: inherit; }

.man-main a { color: var(--c-primary); text-decoration: none; }
.man-main a:hover { text-decoration: underline; }

/* Tables */
.man-main table {
  border-collapse: collapse;
  width: 100%;
  margin: 16px 0;
  font-size: 14px;
}
.man-main th {
  text-align: left;
  background: var(--c-divider);
  padding: 8px 12px;
  border-bottom: 2px solid var(--c-border);
  font-weight: 600;
}
.man-main td {
  padding: 6px 12px;
  border-bottom: 1px solid var(--c-divider);
}
.man-main tr:hover td { background: var(--c-divider); }

/* hr separator */
.man-main hr {
  border: 0; border-top: 1px solid var(--c-divider);
  margin: 32px 0;
}

/* Search highlight */
mark.search-hit {
  background: var(--c-warn-soft);
  color: var(--c-warn-text);
  padding: 1px 2px; border-radius: 3px;
}

/* Mobile */
@media (max-width: 900px) {
  .man-layout { grid-template-columns: 1fr; }
  .man-aside {
    position: relative; top: 0; height: auto;
    border-right: 0; border-bottom: 1px solid var(--c-divider);
  }
  .man-main { padding: 20px 18px 60px; }
  .man-header input[type="search"] { width: 140px; }
}

/* Print */
@media print {
  .man-header, .man-aside { display: none; }
  .man-main { max-width: none; padding: 0; }
  .man-layout { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="man-header">
  <h1>
    คู่มือการใช้งาน <span class="pill">Comply Verify Tool</span>
  </h1>
  <span class="spacer"></span>
  <input type="search" id="man-search" placeholder="ค้นในคู่มือ…" autocomplete="off">
  <a href="/" class="primary">← กลับไปหน้า GUI</a>
</header>

<div class="man-layout">
  <aside class="man-aside" id="man-aside">
    <div class="toc-title">สารบัญ</div>
    <ul class="toc" id="toc"></ul>
  </aside>

  <main class="man-main" id="man-main">
    <p style="color:var(--c-text-faint);font-style:italic">กำลังโหลดคู่มือ…</p>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
(async function() {
  const main = document.getElementById('man-main');
  const tocEl = document.getElementById('toc');

  // Configure marked
  marked.setOptions({
    gfm: true,
    breaks: false,
    headerIds: true,
  });

  // Custom slugger so anchors match the markdown's manual TOC links
  const slugify = (text) => text.trim().toLowerCase()
    .replace(/[^\w฀-๿\s\-]/g, '')
    .replace(/\s+/g, '-');

  let raw;
  try {
    const r = await fetch('/api/manual/raw');
    if (!r.ok) throw new Error(r.statusText);
    raw = await r.text();
  } catch (e) {
    main.innerHTML = `<div style="color:var(--c-danger);padding:20px">โหลดคู่มือไม่ได้: ${e.message}</div>`;
    return;
  }

  // Override heading renderer so id matches our slug
  const renderer = new marked.Renderer();
  renderer.heading = (text, level, raw) => {
    const id = slugify(typeof raw === 'string' ? raw : text);
    return `<h${level} id="${id}">${text}</h${level}>`;
  };
  main.innerHTML = marked.parse(raw, {renderer});

  // Build TOC from rendered headings
  const headings = main.querySelectorAll('h2, h3');
  for (const h of headings) {
    const lvl = parseInt(h.tagName.substring(1));
    const li = document.createElement('li');
    li.className = 'lvl-' + lvl;
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.dataset.target = h.id;
    a.addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById(h.id).scrollIntoView({behavior: 'smooth', block: 'start'});
      history.replaceState(null, '', '#' + h.id);
    });
    li.appendChild(a);
    tocEl.appendChild(li);
  }

  // ScrollSpy: highlight current TOC entry as user scrolls
  const observer = new IntersectionObserver((entries) => {
    for (const ent of entries) {
      if (ent.isIntersecting) {
        const id = ent.target.id;
        document.querySelectorAll('.toc a').forEach(a => {
          a.classList.toggle('active', a.dataset.target === id);
        });
      }
    }
  }, { rootMargin: '-20% 0px -70% 0px' });
  for (const h of headings) observer.observe(h);

  // Auto-scroll to anchor if URL has one
  if (window.location.hash) {
    const target = document.getElementById(window.location.hash.substring(1));
    if (target) target.scrollIntoView({behavior: 'instant', block: 'start'});
  }

  // Search functionality (highlight matches inline)
  const searchInput = document.getElementById('man-search');
  let _searchTimer = 0;
  searchInput.addEventListener('input', () => {
    if (_searchTimer) clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => doSearch(searchInput.value), 200);
  });

  function doSearch(q) {
    // Strip existing highlights
    main.querySelectorAll('mark.search-hit').forEach(el => {
      const parent = el.parentNode;
      parent.replaceChild(document.createTextNode(el.textContent), el);
      parent.normalize();
    });
    if (!q || q.length < 2) return;
    // Find first hit and scroll to it
    const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    let firstHit = null;
    const walker = document.createTreeWalker(main, NodeFilter.SHOW_TEXT, {
      acceptNode: (node) =>
        node.parentElement && !['SCRIPT', 'STYLE', 'CODE', 'PRE'].includes(node.parentElement.tagName)
        ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT,
    });
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    for (const n of nodes) {
      if (!re.test(n.textContent)) continue;
      re.lastIndex = 0;
      const html = n.textContent.replace(re, m => `<mark class="search-hit">${m}</mark>`);
      const span = document.createElement('span');
      span.innerHTML = html;
      n.parentNode.replaceChild(span, n);
      if (!firstHit) firstHit = span.querySelector('mark.search-hit');
    }
    if (firstHit) firstHit.scrollIntoView({behavior: 'smooth', block: 'center'});
  }
})();
</script>
</body>
</html>
